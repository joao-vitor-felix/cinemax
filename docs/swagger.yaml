basePath: /
consumes:
- application/json
definitions:
  controller.ErrorResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  controller.Link:
    properties:
      href:
        type: string
      method:
        type: string
    type: object
  controller.Resource:
    properties:
      data: {}
      links:
        additionalProperties:
          $ref: '#/definitions/controller.Link'
        type: object
    type: object
  domain.Gender:
    enum:
    - male
    - female
    - other
    - prefer_not_to_say
    type: string
    x-enum-varnames:
    - Male
    - Female
    - Other
    - PreferNotToSay
  port.RefreshTokenInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  port.RefreshTokenOutput:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  port.SignInInput:
    properties:
      email:
        type: string
      password:
        maxLength: 12
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  port.SignInOutput:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  port.SignUpInput:
    properties:
      date_of_birth:
        type: string
      email:
        type: string
      first_name:
        minLength: 2
        type: string
      gender:
        allOf:
        - $ref: '#/definitions/domain.Gender'
        enum:
        - male
        - female
        - prefer_not_to_say
        - other
      last_name:
        minLength: 2
        type: string
      password:
        maxLength: 12
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - date_of_birth
    - email
    - first_name
    - last_name
    - password
    - phone
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the API documentation for the Cinemax application.
  title: Cinemax API
  version: "1.0"
paths:
  /auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Refresh the access token using a valid refresh token.
      parameters:
      - description: Refresh token
        in: body
        name: refreshToken
        required: true
        schema:
          $ref: '#/definitions/port.RefreshTokenInput'
      produces:
      - application/json
      responses:
        "200":
          description: Access token refreshed successfully
          schema:
            $ref: '#/definitions/port.RefreshTokenOutput'
        "400":
          description: Bad request (invalid body or validation error)
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
        "401":
          description: Unauthorized (invalid refresh token)
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
        "404":
          description: Not found (token or user not found)
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
      tags:
      - Auth
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return access and refresh tokens.
      parameters:
      - description: User credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/port.SignInInput'
      produces:
      - application/json
      responses:
        "200":
          description: User authenticated successfully
          schema:
            $ref: '#/definitions/port.SignInOutput'
        "400":
          description: Bad request (invalid body or validation error)
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
        "401":
          description: Unauthorized (invalid credentials)
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
      summary: Sign in a user
      tags:
      - Auth
  /auth/sign-up:
    post:
      consumes:
      - application/json
      description: Register a new user with the provided information.
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/port.SignUpInput'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            $ref: '#/definitions/controller.Resource'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/controller.ErrorResponse'
      summary: Sign up a user
      tags:
      - Auth
produces:
- application/json
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
